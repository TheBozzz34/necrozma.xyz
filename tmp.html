<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Animation</title>
    <style>
        canvas {
            border: 1px solid black;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Set canvas width and height
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Ball properties
        const ballRadius = 20;
        let x = canvas.width / 2;
        const y = canvas.height - ballRadius;
        const maxSpeed = 5; // Maximum speed at the center
        const minSpeed = 1; // Minimum speed at the edges

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#0095DD';
            ctx.fill();
            ctx.closePath();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBall();

            // Calculate the x position using a sine function
            x = canvas.width / 2 + Math.sin(angle) * amplitude;

            // Increment the angle
            angle += frequency;

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
